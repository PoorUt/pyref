<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Python Libraries — Reference Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #ffffff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 80px 28px 100px;
  }

  header {
    text-align: center;
    margin-bottom: 70px;
  }

  header .eyebrow {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 16px;
  }

  header h1 {
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    font-weight: 900;
    color: #0f172a;
    letter-spacing: -2px;
    line-height: 1.08;
    margin-bottom: 18px;
  }

  header p {
    font-size: 1rem;
    color: #64748b;
    font-weight: 400;
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .divider {
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 2px;
    margin: 24px auto 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 22px;
  }

  .card {
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(12px);
    border: 1.5px solid #e8edf4;
    border-radius: 18px;
    padding: 28px 26px 24px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    transition: transform 0.22s cubic-bezier(.22,.68,0,1.2), box-shadow 0.22s ease, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 24px 48px rgba(0, 0, 0, 0.09), 0 4px 12px rgba(0,0,0,0.04);
    border-color: var(--accent-light);
  }

  .card:hover::before { opacity: 1; }

  .card-icon {
    font-size: 2rem;
    margin-bottom: 14px;
    display: block;
    line-height: 1;
  }

  .card-name {
    font-size: 1.15rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 5px;
    letter-spacing: -0.3px;
  }

  .card-libs {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .card-desc {
    font-size: 0.8rem;
    color: #64748b;
    line-height: 1.6;
    flex: 1;
  }

  .card-arrow {
    margin-top: 18px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 5px;
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.2s, transform 0.2s;
  }

  .card:hover .card-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  footer {
    text-align: center;
    margin-top: 80px;
    font-size: 0.75rem;
    color: #cbd5e1;
  }

  .grid-loading {
    text-align: center;
    color: #94a3b8;
    font-size: 0.85rem;
    padding: 40px 0;
    grid-column: 1 / -1;
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="content">
  <header>
    <p class="eyebrow">Reference Guide</p>
    <h1>Python Libraries</h1>
    <p>Complete API reference trees for the most-used Python libraries — all in one place.</p>
    <div class="divider"></div>
  </header>

  <div class="grid" id="grid">
    <div class="grid-loading">Loading libraries…</div>
  </div>

  <footer id="footer"></footer>
</div>

<script>
/* ── Library data ──────────────────────────────────────────────────────────
   To add a new library: copy one block below, fill in the fields, done.
   ───────────────────────────────────────────────────────────────────────── */
const LIBRARIES = [
  {
    icon: "🔢",
    name: "NumPy",
    libs: "numpy",
    desc: "Numerical computing, N-dimensional arrays, linear algebra, FFT, random, and broadcasting.",
    file: "numpy_tree.html",
    accent: "#3b82f6",
    accentLight: "#bfdbfe"
  },
  {
    icon: "🐼",
    name: "Pandas",
    libs: "pandas",
    desc: "DataFrames, Series, groupby, merging, time series, IO, and data wrangling tools.",
    file: "pandas_tree.html",
    accent: "#f97316",
    accentLight: "#fed7aa"
  },
  {
    icon: "🤖",
    name: "Scikit-learn",
    libs: "sklearn",
    desc: "ML algorithms, preprocessing, pipelines, model selection, metrics, and cross-validation.",
    file: "sklearn_tree.html",
    accent: "#ec4899",
    accentLight: "#fbcfe8"
  },
  {
    icon: "📊",
    name: "Matplotlib",
    libs: "matplotlib",
    desc: "2D plotting, figures, axes, colormaps, animations, backends, and pyplot API.",
    file: "matplotlib_tree.html",
    accent: "#22c55e",
    accentLight: "#bbf7d0"
  },
  {
    icon: "🌊",
    name: "Seaborn",
    libs: "seaborn",
    desc: "Statistical visualization, themes, distribution plots, categorical plots, and facet grids.",
    file: "seaborn_tree.html",
    accent: "#06b6d4",
    accentLight: "#a5f3fc"
  },
  {
    icon: "🔥",
    name: "PyTorch",
    libs: "torch",
    desc: "Tensors, autograd, neural network modules, optimizers, CUDA, and TorchScript.",
    file: "pytorch_tree.html",
    accent: "#ef4444",
    accentLight: "#fecaca"
  },
  {
    icon: "🔗",
    name: "AI & Scientific Stack",
    libs: "LangChain · SciPy · LangGraph · Google ADK",
    desc: "LLM chains, agents, tools, scientific computing, graph-based workflows, and AI agent SDKs.",
    file: "lang Chain, Sci py, Google ADK, Lang Graph.html",
    accent: "#8b5cf6",
    accentLight: "#ddd6fe"
  }
];

/* ── Render ── */
(function () {
  const grid = document.getElementById('grid');
  const footer = document.getElementById('footer');

  grid.innerHTML = LIBRARIES.map(lib => `
    <a class="card" href="${encodeURI(lib.file)}"
       style="--accent:${lib.accent}; --accent-light:${lib.accentLight};">
      <span class="card-icon">${lib.icon}</span>
      <div class="card-name">${lib.name}</div>
      <div class="card-libs">${lib.libs}</div>
      <div class="card-desc">${lib.desc}</div>
      <div class="card-arrow">Explore tree →</div>
    </a>
  `).join('');

  footer.textContent = `${LIBRARIES.length} ${LIBRARIES.length === 1 ? 'library' : 'libraries'} · Python Reference Trees`;
})();


/* ── Blackhole canvas effect ── */
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');

  const SPACING = 30;
  const DOT_R = 1.6;
  const RADIUS = 180;
  const PULL = 0.72;
  const EASE = 0.13;

  let W, H, dots = [];
  let mouse = { x: -9999, y: -9999 };

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildDots();
  }

  function buildDots() {
    dots = [];
    const cols = Math.ceil(W / SPACING) + 2;
    const rows = Math.ceil(H / SPACING) + 2;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const bx = c * SPACING;
        const by = r * SPACING;
        dots.push({ bx, by, x: bx, y: by });
      }
    }
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const d of dots) {
      const dx = mouse.x - d.bx;
      const dy = mouse.y - d.by;
      const dist = Math.sqrt(dx * dx + dy * dy);
      let tx = d.bx, ty = d.by;
      if (dist < RADIUS && dist > 0) {
        const force = Math.pow(1 - dist / RADIUS, 2) * PULL;
        tx = d.bx + dx * force;
        ty = d.by + dy * force;
      }
      d.x += (tx - d.x) * EASE;
      d.y += (ty - d.y) * EASE;
      const shift = Math.sqrt((d.x - d.bx) ** 2 + (d.y - d.by) ** 2);
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_R, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(148,163,184,${0.18 + Math.min(shift / 40, 1) * 0.32})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }

  resize();
  frame();
})();
</script>
</body>
</html>
