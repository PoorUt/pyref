<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: #1e2330;
    --text: #e2e8f0;
    --muted: #64748b;
    --langchain: #f59e0b;
    --scipy: #22d3ee;
    --langgraph: #a78bfa;
    --adk: #34d399;
    --module: #f1f5f9;
    --class: #fbbf24;
    --func: #67e8f9;
    --tool: #86efac;
    --type: #c4b5fd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 32px 24px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #f59e0b, #a78bfa, #22d3ee, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 28px;
    font-family: 'JetBrains Mono', monospace;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 28px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .search-bar {
    width: 100%;
    max-width: 400px;
    padding: 9px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    margin-bottom: 24px;
    transition: border-color 0.2s;
  }
  .search-bar:focus { border-color: #a78bfa; }
  .search-bar::placeholder { color: var(--muted); }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { color: var(--text); border-color: #64748b; }
  .btn.active { color: #fff; border-color: #a78bfa; background: #a78bfa22; }

  .tree-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
    gap: 20px;
  }

  .lib-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .lib-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    user-select: none;
  }

  .lib-color-bar {
    width: 4px;
    height: 32px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .lib-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }

  .lib-desc {
    color: var(--muted);
    font-size: 11px;
    margin-top: 2px;
  }

  .lib-toggle {
    margin-left: auto;
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.2s;
  }

  .lib-body {
    padding: 8px 0;
  }

  /* Tree nodes */
  .node {
    display: flex;
    align-items: flex-start;
    padding: 3px 0;
  }

  .node-indent {
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
  }

  .node-line {
    width: 20px;
    position: relative;
    flex-shrink: 0;
  }

  .node-line::before {
    content: '';
    position: absolute;
    left: 10px;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--border);
  }

  .node-connector {
    width: 20px;
    position: relative;
    flex-shrink: 0;
  }

  .node-connector::before {
    content: '';
    position: absolute;
    left: 10px;
    top: 0;
    height: 50%;
    width: 1px;
    background: var(--border);
  }

  .node-connector::after {
    content: '';
    position: absolute;
    left: 10px;
    top: 50%;
    width: 10px;
    height: 1px;
    background: var(--border);
  }

  .node-label {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 3px 8px 3px 2px;
    border-radius: 4px;
    cursor: pointer;
    flex: 1;
    transition: background 0.1s;
    min-width: 0;
  }
  .node-label:hover { background: #ffffff08; }

  .node-icon {
    font-size: 11px;
    flex-shrink: 0;
    width: 18px;
    text-align: center;
  }

  .node-text {
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .node-tag {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .node-desc {
    font-size: 10px;
    color: var(--muted);
    margin-left: 4px;
    flex-shrink: 0;
    display: none;
  }

  .node-label:hover .node-desc { display: inline; }

  .node-children {
    overflow: hidden;
    transition: max-height 0.2s ease;
  }

  .collapsed > .node-children { display: none; }

  .toggle-btn {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    line-height: 1;
    user-select: none;
  }

  .highlight { background: #f59e0b33 !important; }
  .hidden { display: none !important; }

  /* Tag colors */
  .tag-module { background: #1e2330; color: #94a3b8; }
  .tag-class { background: #451a03; color: var(--class); }
  .tag-function { background: #083344; color: var(--func); }
  .tag-tool { background: #052e16; color: var(--tool); }
  .tag-type { background: #2e1065; color: var(--type); }
  .tag-method { background: #1c1917; color: #a8a29e; }
  .tag-component { background: #1a2e05; color: #86efac; }
  .tag-enum { background: #2d1b69; color: #c4b5fd; }
  .tag-mixin { background: #1e1b4b; color: #a5b4fc; }

  /* Node type coloring */
  .type-module .node-text { color: #94a3b8; }
  .type-class .node-text { color: var(--class); }
  .type-function .node-text { color: var(--func); }
  .type-tool .node-text { color: var(--tool); }
  .type-type .node-text { color: var(--type); }
  .type-method .node-text { color: #a8a29e; }

  @media (max-width: 600px) {
    .tree-container { grid-template-columns: 1fr; }
    h1 { font-size: 22px; }
  }
</style>

function buildNode(item, depth, isLast) {
  const hasChildren = item.children && item.children.length > 0;
  const id = Math.random().toString(36).slice(2);
  const typeClass = item.type ? `type-${item.type}` : 'type-module';

  const div = document.createElement('div');
  div.className = `node-wrapper ${hasChildren ? 'collapsible' : ''}`;
  div.dataset.id = id;

  // Build row
  const row = document.createElement('div');
  row.className = `node`;
  row.style.paddingLeft = `${depth * 20 + 12}px`;

  // Toggle button or spacer
  const toggleEl = document.createElement('div');
  toggleEl.style.width = '16px';
  toggleEl.style.flexShrink = '0';
  toggleEl.style.marginRight = '4px';
  if (hasChildren) {
    toggleEl.className = 'toggle-btn';
    toggleEl.textContent = '−';
    toggleEl.onclick = (e) => {
      e.stopPropagation();
      toggleNode(id);
    };
  }
  row.appendChild(toggleEl);

  // Label
  const label = document.createElement('div');
  label.className = `node-label ${typeClass}`;
  label.innerHTML = `
    <span class="node-text">${item.name}</span>
    ${item.type && item.type !== 'module' ? `<span class="node-tag tag-${item.type}">${item.type}</span>` : ''}
    ${item.desc ? `<span class="node-desc">— ${item.desc}</span>` : ''}
  `;
  row.appendChild(label);
  div.appendChild(row);

  if (hasChildren) {
    const childContainer = document.createElement('div');
    childContainer.className = 'node-children';
    childContainer.dataset.parent = id;
    item.children.forEach((child, i) => {
      childContainer.appendChild(buildNode(child, depth + 1, i === item.children.length - 1));
    });
    div.appendChild(childContainer);
  }

  return div;
}

function toggleNode(id) {
  const wrapper = document.querySelector(`[data-id="${id}"]`);
  const children = document.querySelector(`[data-parent="${id}"]`);
  const btn = wrapper.querySelector('.toggle-btn');
  if (!children) return;
  const hidden = children.style.display === 'none';
  children.style.display = hidden ? '' : 'none';
  btn.textContent = hidden ? '−' : '+';
}

function expandAll() {
  document.querySelectorAll('.node-children').forEach(el => el.style.display = '');
  document.querySelectorAll('.toggle-btn').forEach(el => el.textContent = '−');
}

function collapseAll() {
  document.querySelectorAll('.node-children').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.toggle-btn').forEach(el => el.textContent = '+');
}

function filterTree(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.node-wrapper').forEach(el => {
    el.style.background = '';
  });
  if (!q) {
    document.querySelectorAll('.node-wrapper').forEach(el => el.style.display = '');
    return;
  }
  document.querySelectorAll('.node-text').forEach(el => {
    const text = el.textContent.toLowerCase();
    const wrapper = el.closest('.node-wrapper');
    if (text.includes(q)) {
      wrapper.style.background = '#f59e0b18';
      // show all parents
      let parent = wrapper.parentElement;
      while (parent) {
        if (parent.classList.contains('node-children')) {
          parent.style.display = '';
        }
        if (parent.classList.contains('lib-body') || parent.classList.contains('tree-container')) break;
        parent = parent.parentElement;
      }
    }
  });
}

function render() {
  const container = document.getElementById('treeContainer');
  DATA.forEach(lib => {
    const card = document.createElement('div');
    card.className = 'lib-card';

    const header = document.createElement('div');
    header.className = 'lib-header';
    header.innerHTML = `
      <div class="lib-color-bar" style="background:${lib.color}"></div>
      <div>
        <div class="lib-name" style="color:${lib.color}">${lib.name}</div>
        <div class="lib-desc">${lib.desc}</div>
      </div>
      <div class="lib-toggle">−</div>
    `;

    const body = document.createElement('div');
    body.className = 'lib-body';

    lib.children.forEach((child, i) => {
      body.appendChild(buildNode(child, 0, i === lib.children.length - 1));
    });

    header.onclick = () => {
      const vis = body.style.display !== 'none';
      body.style.display = vis ? 'none' : '';
      header.querySelector('.lib-toggle').textContent = vis ? '+' : '−';
    };

    card.appendChild(header);
    card.appendChild(body);
    container.appendChild(card);
  });
}
